<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanim Research Engine</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 24px;
      font-size: 12px;
      color: #7c3aed;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 60px;
    }

    .container {
      width: 100%;
      max-width: 580px;
    }

    /* ── STAGE 1: INPUT ── */
    #stage-input {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp 0.35s ease;
    }

    .input-box {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      padding: 18px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
      caret-color: #7c3aed;
    }

    .input-box:focus {
      border-color: #7c3aed;
    }

    .input-box::placeholder {
      color: #2e2e42;
    }

    .input-box.has-error {
      border-color: #ff4444;
    }

    .error-msg {
      color: #ff4444;
      font-size: 12px;
      align-self: flex-start;
      display: none;
      letter-spacing: 0.03em;
    }

    .error-msg.show {
      display: block;
    }

    .run-btn {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 17px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .run-btn:hover {
      background: #6d28d9;
    }

    .run-btn:active {
      transform: scale(0.985);
    }

    .internal-note {
      font-size: 11px;
      color: #1e1e2e;
      letter-spacing: 0.04em;
    }

    /* ── STAGE 2 & 4: TERMINAL ── */
    #stage-terminal,
    #stage-email-terminal {
      display: none;
      flex-direction: column;
      gap: 2px;
      animation: fadeUp 0.35s ease;
    }

    .terminal-line {
      color: #00ff88;
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .terminal-line.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── STAGE 3a: DISQUALIFIED ── */
    #stage-disqualified {
      display: none;
      flex-direction: column;
      gap: 18px;
      animation: fadeUp 0.35s ease;
    }

    .disq-card {
      background: #120808;
      border: 1px solid #ff4444;
      border-radius: 4px;
      padding: 24px;
    }

    .disq-heading {
      color: #ff4444;
      font-size: 15px;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .disq-reason {
      color: #6a3a3a;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .btn-reset-disq {
      width: 100%;
      background: transparent;
      color: #ff4444;
      border: 1px solid #ff4444;
      border-radius: 4px;
      padding: 14px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-reset-disq:hover {
      background: #ff4444;
      color: #fff;
    }

    /* ── STAGE 3b: QUALIFIED FLASH ── */
    #stage-qualified-flash {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      animation: fadeUp 0.3s ease;
    }

    .qualified-text {
      color: #00ff88;
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    /* ── STAGE 5: EMAIL READY ── */
    #stage-email-ready {
      display: none;
      flex-direction: column;
      gap: 18px;
      animation: fadeUp 0.35s ease;
    }

    .email-card {
      background: #0d0d1a;
      border: 1px solid #7c3aed;
      border-radius: 4px;
      padding: 24px;
      box-shadow: 0 0 32px rgba(124, 58, 237, 0.12), 0 0 8px rgba(124, 58, 237, 0.06);
    }

    .email-field {
      margin-bottom: 18px;
    }

    .email-field:last-child {
      margin-bottom: 0;
    }

    .email-label {
      font-size: 10px;
      color: #7c3aed;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .email-value {
      font-size: 13px;
      color: #d0d0e0;
      line-height: 1.75;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .email-divider {
      border: none;
      border-top: 1px solid #16162a;
      margin: 18px 0;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      flex: 1;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 14px 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-outline {
      flex: 1;
      background: transparent;
      color: #7c3aed;
      border: 1px solid #7c3aed;
      border-radius: 4px;
      padding: 14px 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-outline:hover {
      background: #7c3aed;
      color: #fff;
    }

    /* ── DOSSIER TOGGLE ── */
    .dossier-toggle {
      font-size: 12px;
      color: #5a3aad;
      cursor: pointer;
      text-align: center;
      padding: 6px;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      user-select: none;
    }

    .dossier-toggle:hover {
      color: #7c3aed;
    }

    .dossier-card {
      display: none;
      background: #0d0d1a;
      border-left: 3px solid #7c3aed;
      border-radius: 0 4px 4px 0;
      padding: 20px 20px 20px 18px;
      max-height: 380px;
      overflow-y: auto;
      animation: fadeIn 0.25s ease;
    }

    .dossier-card.open {
      display: block;
    }

    .dossier-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: #7a7a9a;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .dossier-card::-webkit-scrollbar       { width: 4px; }
    .dossier-card::-webkit-scrollbar-track { background: transparent; }
    .dossier-card::-webkit-scrollbar-thumb { background: #3a1a7a; border-radius: 2px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .main { align-items: flex-start; padding-top: 24px; }
      .input-box, .run-btn { font-size: 14px; }
      .btn-row { flex-direction: column; }
      .terminal-line { font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="header">// Tanim Research Engine</div>

  <div class="main">
    <div class="container">

      <!-- STAGE 1: INPUT -->
      <div id="stage-input">
        <input
          id="email-input"
          type="text"
          class="input-box"
          placeholder="// Paste prospect email address..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <div id="error-msg" class="error-msg">// ERROR: Invalid email address.</div>
        <button class="run-btn" onclick="runResearch()">// Run Research Engine</button>
        <div class="internal-note">// Internal use only.</div>
      </div>

      <!-- STAGE 2: RESEARCH TERMINAL -->
      <div id="stage-terminal"></div>

      <!-- STAGE 3a: DISQUALIFIED -->
      <div id="stage-disqualified">
        <div class="disq-card">
          <div class="disq-heading">// PROSPECT DISQUALIFIED</div>
          <div id="disq-reason" class="disq-reason"></div>
        </div>
        <button class="btn-reset-disq" onclick="resetToStage1()">// Run New Prospect</button>
      </div>

      <!-- STAGE 3b: QUALIFIED FLASH -->
      <div id="stage-qualified-flash">
        <div class="qualified-text">// QUALIFIED. Generating email...</div>
      </div>

      <!-- STAGE 4: EMAIL GENERATION TERMINAL -->
      <div id="stage-email-terminal"></div>

      <!-- STAGE 5: EMAIL READY -->
      <div id="stage-email-ready">
        <div class="email-card">
          <div class="email-field">
            <div class="email-label">To</div>
            <div id="email-to" class="email-value"></div>
          </div>
          <hr class="email-divider">
          <div class="email-field">
            <div class="email-label">Subject</div>
            <div id="email-subject" class="email-value"></div>
          </div>
          <hr class="email-divider">
          <div class="email-field">
            <div class="email-label">Body</div>
            <div id="email-body" class="email-value"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-primary" onclick="openMailApp()">// Open in Mail App</button>
          <button class="btn-outline" onclick="resetToStage1()">// Run New Prospect</button>
        </div>

        <div class="dossier-toggle" id="dossier-toggle" onclick="toggleDossier()">
          // View Research Dossier
        </div>
        <div class="dossier-card" id="dossier-card">
          <pre class="dossier-text" id="dossier-text"></pre>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ── STATE ── */
    var prospectEmail = '';
    var dossierText   = '';
    var emailSubject  = '';
    var emailBody     = '';
    var dossierOpen   = false;

    /* ── UTILITIES ── */
    function wait(ms) {
      return new Promise(function(r) { setTimeout(r, ms); });
    }

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    var ALL_STAGES = [
      'stage-input',
      'stage-terminal',
      'stage-disqualified',
      'stage-qualified-flash',
      'stage-email-terminal',
      'stage-email-ready'
    ];

    function showOnly(id) {
      ALL_STAGES.forEach(function(sid) {
        var el = document.getElementById(sid);
        el.style.display = 'none';
      });
      var target = document.getElementById(id);
      target.style.display = 'flex';
      target.style.flexDirection = 'column';
    }

    /* ── RESET ── */
    function resetToStage1() {
      var input = document.getElementById('email-input');
      input.value = '';
      input.classList.remove('has-error');
      document.getElementById('error-msg').classList.remove('show');
      dossierOpen = false;
      document.getElementById('dossier-card').classList.remove('open');
      document.getElementById('dossier-toggle').textContent = '// View Research Dossier';
      showOnly('stage-input');
    }

    /* ── DOSSIER TOGGLE ── */
    function toggleDossier() {
      dossierOpen = !dossierOpen;
      var card   = document.getElementById('dossier-card');
      var toggle = document.getElementById('dossier-toggle');
      if (dossierOpen) {
        card.classList.add('open');
        toggle.textContent = '// Hide Research Dossier';
      } else {
        card.classList.remove('open');
        toggle.textContent = '// View Research Dossier';
      }
    }

    /* ── TERMINAL ANIMATION ── */
    function runTerminal(containerId, lines, intervalMs) {
      var el = document.getElementById(containerId);
      el.innerHTML = '';
      lines.forEach(function(line, i) {
        var div = document.createElement('div');
        div.className = 'terminal-line';
        div.textContent = line;
        div.id = containerId + '-line-' + i;
        el.appendChild(div);
      });

      var chain = Promise.resolve();
      lines.forEach(function(line, i) {
        chain = chain
          .then(function() { return wait(intervalMs); })
          .then(function() {
            var lineEl = document.getElementById(containerId + '-line-' + i);
            if (lineEl) lineEl.classList.add('show');
          });
      });
      return chain;
    }

    /* ── FLEXIBLE TEXT EXTRACTOR ── */
    function extractText(data) {
      if (typeof data === 'string') return data;
      if (data.text)     return data.text;
      if (data.response) return data.response;
      if (data.content && typeof data.content === 'string') return data.content;
      if (Array.isArray(data.content)) {
        return data.content.map(function(c) { return (c && c.text) ? c.text : ''; }).join('');
      }
      if (data.result)  return data.result;
      if (data.output)  return data.output;
      if (data.message) return data.message;
      return JSON.stringify(data);
    }

    /* ── GEMINI API ── */
    function callGemini(email) {
      var prompt =
'ROLE: You are a research analyst working for Tanim, a 22-year-old content production specialist and operations expert who works directly with business owners as a dedicated individual contributor, not an agency. He handles video editing, podcast editing, short-form content, thumbnails, social media management, content distribution, cold outreach infrastructure, web design, and AI workflow automation personally. Your job is to validate prospects and build intelligence dossiers used to write personalized outreach emails from Tanim directly to business owners.\n\n' +
'CRITICAL CONTEXT: Tanim works with BUSINESS OWNERS who use content as a sales channel to sell courses, coaching, consulting, or services worth $2,000 or more. Not YouTubers who make money from AdSense and sponsors.\n\n' +
'The difference: YouTuber = Makes money FROM content = DISQUALIFY. Business Owner = Makes money THROUGH content to drive sales to offers = QUALIFY.\n\n' +
'YOUR INPUT: Gmail address: ' + email + '. Your job is to find their YouTube channel from this email then research them deeply. Many creators list their Gmail in their YouTube About section. Search for this email across the web, find their YouTube channel, go deep on their content and business. Be thorough.\n\n' +
'PHASE 1: INSTANT DISQUALIFICATION CHECK. Before any research check for these automatic disqualifiers: Gaming, Vlogging, Reaction or Prank content. Crypto, NFT or Trading guru. Kids, Family or Lifestyle-only. Music artists. Political or Religious content. ASMR or Relaxation. No sellable offer visible. Only income appears to be AdSense or Sponsors. Fitness influencer without $2k+ coaching offer. If any disqualifier applies, start your entire response with exactly the word DISQUALIFIED followed by a colon and the reason, then stop completely.\n\n' +
'PHASE 2: SHARK QUALIFICATION. Score the prospect one point each: High-ticket offer visible $2k+ courses coaching or consulting. Team evidence. Speaking or consulting background. Active content posted in last 30 days. Clear pain point visible in content. B2B focus serving businesses not consumers. Website with services page not just Linktree. Score 5-7 = SHARK. Score 3-4 = PROSPECT. Score 0-2 = start response with DISQUALIFIED and reason then stop.\n\n' +
'PHASE 3: DEEP DIVE RESEARCH. Document: exact business model and how they make money, any price points found, team size, recent milestones launches or funding, podcast appearances, speaking history. Flag if email appears to be info@ contact@ support@ team@ or assistant-managed.\n\n' +
'PHASE 4: PROOF OF LIFE EXTRACTION. Find 3-4 highly specific details from their two most recent videos that prove genuine research. Details so specific the prospect would think: this person actually watched my content. Include video titles and timestamps where possible.\n\n' +
'PHASE 5: CONTENT QUALITY ASSESSMENT. Analyze both videos for visual quality, audio quality, content structure and pacing, distribution and repurposing. Identify the single PRIMARY OPPORTUNITY where Tanim could make the biggest difference for this specific person.\n\n' +
'PHASE 6: ADD-ON SELECTION. Choose exactly ONE: Cold Outreach if they have a clear B2B service and need more clients in their pipeline. Web Design if they have no proper website or only a Linktree. AI/RevOps if they mention being overwhelmed, inconsistent posting, or too much manual work.\n\n' +
'OUTPUT: Build the complete dossier in this exact format with these exact labels on separate lines:\n\n' +
'RESEARCH DOSSIER: [Name]\n' +
'EMAIL: ' + email + '\n' +
'EMAIL QUALITY: [Decision-maker or Generic or Flagged]\n' +
'YOUTUBE: [channel link if found]\n' +
'VIDEOS ANALYZED: [Video 1 title] and [Video 2 title]\n' +
'WEBSITE: [if found, otherwise none found]\n' +
'BUSINESS MODEL: [how they make money]\n' +
'PRICE POINTS: [if found, otherwise not found publicly]\n' +
'TEAM EVIDENCE: [what you found]\n' +
'SHARK SCORE: [X/7]\n' +
'VERDICT: [SHARK or PROSPECT]\n' +
'PROOF OF LIFE: [3-4 specific details with sources]\n' +
'CONTENT QUALITY: [visual notes, audio notes, structure notes, distribution notes]\n' +
'PRIMARY OPPORTUNITY: [the one area where Tanim could help most]\n' +
'RECOMMENDED ADD-ON: [Cold Outreach or Web Design or AI-RevOps]\n' +
'EMAIL ANGLE: [2-3 sentences on the best way for Tanim to approach this person as an individual]';

      return fetch('https://tanim-ai-agent.nasrullahtanim.workers.dev/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: prompt })
      })
      .then(function(res) {
        if (!res.ok) throw new Error('Gemini error: ' + res.status);
        return res.json();
      })
      .then(extractText);
    }

    /* ── CLAUDE API ── */
    function callClaude(dossier) {
      var system =
'ROLE: You are writing cold outreach emails for Tanim, a 22-year-old content production and operations specialist who works directly with business owners as an individual, not through an agency. He is reaching out personally to offer his skills directly.\n\n' +
'WHO TANIM IS: He handles everything himself: video editing, podcast editing, short-form clips and reels, thumbnails, social media management, content distribution. He also does cold outreach infrastructure, web design, and AI workflow automation depending on what the person needs. He positions himself as someone who becomes a dedicated part of their operation, not a freelancer who disappears after a project.\n\n' +
'YOUR VOICE: The Friendly Expert who genuinely watched their content. Warm and real. Knowledgeable but not showing off. Helpful not salesy. Sounds like a talented person reaching out personally, not a company sending a blast.\n\n' +
'SUBJECT LINE RULES: One perfect subject line only. 3-7 words. Personalized to this specific person. Creates curiosity. All lowercase. No spam triggers. Never use: Quick question, Opportunity for Name, Partnership proposal, I love your content, Can I help you, Video editing services, or anything over 7 words.\n\n' +
'EMAIL STRUCTURE:\n' +
'Section 1 opener 2-3 sentences: Use one specific Proof of Life detail from the dossier. Show you actually watched their content. Genuine and specific, not flattery.\n' +
'Section 2 who Tanim is plus core service 2-3 sentences: Quick intro as Tanim, someone who handles content production end to end personally. Frame it as taking the entire production workload off their plate so they can focus on what only they can do.\n' +
'Section 3 the add-on 1-2 sentences: Transition naturally with Also or On a separate note. Mention the one recommended add-on from the dossier as a casual observation, not a pitch. Keep it light like a helpful aside between two people who get it.\n' +
'Section 4 the close 1-2 sentences: Soft and low pressure. Something like would love to chat if any of this sounds useful. Sign off with just Tanim.\n\n' +
'HARD CONSTRAINTS:\n' +
'Email must be 120-180 words total.\n' +
'Never use em dashes anywhere in the email.\n' +
'Never use: I hope this email finds you well, Dear Mr or Ms, I came across your content, Take it to the next level, Leverage, Synergy, Optimize, Would you be available for a call, Best regards, Kind regards, Sincerely, any language that sounds critical of their work, any corporate or agency language.\n' +
'Sound like one person writing to another person they respect.\n\n' +
'OUTPUT FORMAT: First line exactly: SUBJECT: [subject line]. Then one blank line. Then the full email body. Nothing else.';

      return fetch('https://tanim-ai-agent.nasrullahtanim.workers.dev/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: system,
          messages: [{
            role: 'user',
            content: 'Here is the research dossier. Write the cold email now:\n\n' + dossier
          }]
        })
      })
      .then(function(res) {
        if (!res.ok) throw new Error('Claude error: ' + res.status);
        return res.json();
      })
      .then(extractText);
    }

    /* ── MAIN PIPELINE ── */
    function runResearch() {
      var inputEl = document.getElementById('email-input');
      var errorEl = document.getElementById('error-msg');
      var email   = inputEl.value.trim();

      if (!isValidEmail(email)) {
        inputEl.classList.add('has-error');
        errorEl.classList.add('show');
        return;
      }

      inputEl.classList.remove('has-error');
      errorEl.classList.remove('show');
      prospectEmail = email;

      /* STAGE 2 */
      var researchLines = [
        '// Initializing research engine...',
        '// Email received: ' + email,
        '// Scanning for digital footprint...',
        '// Locating YouTube channel...',
        '// Analyzing content library...',
        '// Extracting business intelligence...',
        '// Running Shark qualification score...',
        '// Identifying proof of life details...',
        '// Assessing content quality...',
        '// Building dossier...',
        '// Research complete.'
      ];

      showOnly('stage-terminal');

      var geminiPromise = callGemini(email).catch(function(err) {
        return 'DISQUALIFIED: Research pipeline error (' + err.message + ').';
      });

      runTerminal('stage-terminal', researchLines, 600)
        .then(function() { return geminiPromise; })
        .then(function(geminiResponse) {

          /* STAGE 3: QUALIFICATION GATE */
          if (/^DISQUALIFIED/i.test(geminiResponse.trim())) {
            var match  = geminiResponse.match(/^DISQUALIFIED[:\s]*([\s\S]*)/i);
            var reason = match ? match[1].trim() : geminiResponse.trim();
            document.getElementById('disq-reason').textContent = reason;
            showOnly('stage-disqualified');
            return;
          }

          dossierText = geminiResponse;

          /* Qualified flash */
          showOnly('stage-qualified-flash');

          return wait(1500).then(function() {

            /* STAGE 4 */
            var emailLines = [
              '// Passing dossier to Claude...',
              '// Analyzing proof of life details...',
              '// Selecting personalization angle...',
              '// Crafting subject line...',
              '// Writing email body...',
              '// Applying voice guidelines...',
              '// Running quality check...',
              '// Email ready.'
            ];

            showOnly('stage-email-terminal');

            var claudePromise = callClaude(dossierText).catch(function(err) {
              return 'SUBJECT: follow up\n\nUnable to generate email at this time. Please try again. (' + err.message + ')';
            });

            return runTerminal('stage-email-terminal', emailLines, 500)
              .then(function() { return claudePromise; })
              .then(function(claudeResponse) {

                /* PARSE */
                var allLines = claudeResponse.trim().split('\n');
                var subjIdx  = -1;
                for (var i = 0; i < allLines.length; i++) {
                  if (/^SUBJECT:/i.test(allLines[i].trim())) { subjIdx = i; break; }
                }
                emailSubject = subjIdx !== -1
                  ? allLines[subjIdx].replace(/^SUBJECT:\s*/i, '').trim()
                  : '';

                var bodyStart = subjIdx + 1;
                while (bodyStart < allLines.length && allLines[bodyStart].trim() === '') {
                  bodyStart++;
                }
                emailBody = allLines.slice(bodyStart).join('\n').trim();

                /* STAGE 5 */
                document.getElementById('email-to').textContent      = prospectEmail;
                document.getElementById('email-subject').textContent = emailSubject;
                document.getElementById('email-body').textContent    = emailBody;
                document.getElementById('dossier-text').textContent  = dossierText;
                showOnly('stage-email-ready');
              });
          });
        });
    }

    /* ── OPEN MAIL APP ── */
    function openMailApp() {
      var mailto =
        'mailto:' + encodeURIComponent(prospectEmail) +
        '?subject=' + encodeURIComponent(emailSubject) +
        '&body='    + encodeURIComponent(emailBody);
      window.location.href = mailto;
    }

    /* ── INPUT LISTENERS ── */
    document.getElementById('email-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') runResearch();
    });

    document.getElementById('email-input').addEventListener('input', function() {
      this.classList.remove('has-error');
      document.getElementById('error-msg').classList.remove('show');
    });
  </script>
</body>
</html>
