<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tanim.tech</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><text x='16' y='24' font-family='Georgia,serif' font-size='22' font-weight='900' fill='white' text-anchor='middle'>T</text></svg>">
  <style>
    :root {
      --bg: #f5f4ff;
      --surface: #ffffff;
      --surface-alt: #f0eeff;
      --border: #ddd6fe;
      --border-strong: #c4b5fd;
      --text: #1a0a2e;
      --text-muted: #7c6fa0;
      --text-dim: #a89cc8;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --accent-light: #ede9fe;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-bg: #fff5f5;
      --red-border: #fecaca;
      --shadow: 0 4px 32px rgba(124, 58, 237, 0.08);
      --glow: 0 0 0 1px var(--border-strong), 0 4px 32px rgba(124, 58, 237, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ─── LAYOUT ─────────────────────────────────── */
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 28px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header span { color: var(--accent); font-weight: 700; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 620px;
    }

    /* ─── STAGE TRANSITIONS ───────────────────────── */
    .stage {
      display: none;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }

    .stage.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── STAGE 1: INPUT ─────────────────────────── */
    .stage-1-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .stage-1-title span { color: var(--accent); }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .email-input {
      width: 100%;
      padding: 18px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .email-input::placeholder { color: var(--text-dim); }

    .email-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .email-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
    }

    .error-msg {
      display: none;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }

    .btn-primary:active { transform: translateY(1px); }

    .internal-note {
      text-align: center;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-top: 18px;
    }

    /* ─── TERMINAL BLOCK ─────────────────────────── */
    .terminal-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .terminal-card.violet-glow {
      border-color: var(--border-strong);
      box-shadow: var(--glow);
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot-red   { background: #f87171; }
    .dot-amber { background: #fbbf24; }
    .dot-green { background: #34d399; }

    .terminal-title {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-left: 6px;
    }

    .terminal-log {
      min-height: 80px;
    }

    .t-line {
      font-size: 13px;
      line-height: 2;
      color: var(--green);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: lineIn 0.25s ease forwards;
    }

    @keyframes lineIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .t-line::before {
      content: '›';
      color: var(--accent);
      font-size: 14px;
      flex-shrink: 0;
    }

    .t-line.dim { color: var(--text-muted); }

    .cursor-blink {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ─── STAGE 3: DISQUALIFIED ─────────────────── */
    .disq-card {
      background: var(--red-bg);
      border: 1.5px solid var(--red-border);
      border-radius: 8px;
      padding: 28px;
    }

    .disq-heading {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--red);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .disq-reason {
      font-size: 12px;
      color: #b91c1c;
      line-height: 1.7;
      white-space: pre-wrap;
      margin-bottom: 24px;
    }

    /* ─── QUALIFIED FLASH ────────────────────────── */
    .qualified-flash {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .qualified-flash.show { display: block; animation: fadeIn 0.3s ease forwards; }

    .flash-text {
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.06em;
    }

    /* ─── STAGE 5: EMAIL CARD ────────────────────── */
    .email-card {
      background: var(--surface);
      border: 1.5px solid var(--border-strong);
      border-radius: 8px;
      box-shadow: var(--glow);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .email-card-header {
      padding: 14px 20px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
    }

    .email-field {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
    }

    .email-field:last-child { border-bottom: none; }

    .field-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      min-width: 58px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    /* monospace labels, sans-serif values inside the email card */
    .email-card .field-value {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      line-height: 1.75;
      word-break: break-word;
    }

    .field-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .field-body {
      padding: 18px 20px;
    }

    .field-body .field-value {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.8;
      white-space: normal;
    }

    /* ─── BUTTONS ────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .btn-copy-row {
      margin-bottom: 20px;
    }

    .btn-copy {
      width: 100%;
      padding: 12px 20px;
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: center;
    }

    .btn-copy:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .btn-copy.copied {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-bg);
    }

    .btn-solid {
      flex: 1;
      padding: 14px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .btn-solid:hover {
      background: var(--accent-dark);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.28);
    }

    .btn-outline {
      flex: 1;
      padding: 14px 20px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--border-strong);
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-outline:hover {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .btn-reset-disq {
      width: 100%;
      padding: 13px 20px;
      background: transparent;
      border: 1.5px solid var(--red-border);
      color: var(--red);
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset-disq:hover { background: #fee2e2; }

    /* ─── DOSSIER TOGGLE ─────────────────────────── */
    .dossier-toggle {
      background: none;
      border: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-bottom: 14px;
      display: block;
    }

    .dossier-toggle:hover { color: var(--accent-dark); }

    .dossier-panel {
      display: none;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      padding: 20px 22px;
      max-height: 420px;
      overflow-y: auto;
      animation: fadeIn 0.3s ease forwards;
    }

    .dossier-panel.open { display: block; }

    .dossier-panel pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    /* ─── DARK MODE ─────────────────────────────── */
    [data-theme="dark"] {
      --bg: #0d0a1a;
      --surface: #160e2e;
      --surface-alt: #1a1240;
      --border: #2a2050;
      --border-strong: #4a38a0;
      --text: #e8e0ff;
      --text-muted: #9a88cc;
      --text-dim: #5a4880;
      --accent-light: #1e1445;
      --green-bg: #081510;
      --green-border: #153820;
      --red-bg: #1a0808;
      --red-border: #4a1818;
      --shadow: 0 4px 32px rgba(124, 58, 237, 0.2);
      --glow: 0 0 0 1px var(--border-strong), 0 4px 32px rgba(124, 58, 237, 0.28);
    }

    /* ─── HEADER ─────────────────────────────────── */
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    /* ─── THEME TOGGLE ───────────────────────────── */
    .theme-toggle {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      transition: border-color 0.2s, background 0.2s;
      line-height: 1;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    /* ─── HERO ───────────────────────────────────── */
    .hero {
      text-align: center;
      margin-bottom: 44px;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      background: var(--accent);
      color: #fff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      font-size: 40px;
      font-weight: 900;
      margin: 0 auto 22px;
      box-shadow: 0 8px 36px rgba(124, 58, 237, 0.32);
      letter-spacing: -0.02em;
    }

    .hero-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      line-height: 1.7;
    }

    /* ─── SCROLLBAR ──────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-alt); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* ─── MOBILE ─────────────────────────────────── */
    @media (max-width: 520px) {
      main { padding: 24px 14px; }
      .terminal-card, .disq-card, .email-card { padding: 20px 16px; }
      .terminal-card { padding: 20px; }
      .email-field { flex-direction: column; gap: 4px; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-mark">T</div>
        <span class="brand-name">tanim.tech</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <span id="toggle-icon">☾</span>
      </button>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- ══ STAGE 1: INPUT ══════════════════════ -->
      <div class="stage active" id="stage-1">
        <div class="hero">
          <div class="hero-logo">T</div>
          <h1 class="hero-title">Research Engine</h1>
          <p class="hero-sub">Paste a prospect email to run the AI pipeline</p>
        </div>
        <div class="input-wrap">
          <input
            type="email"
            id="email-input"
            class="email-input"
            placeholder="// Paste prospect email address..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <p class="error-msg" id="email-error">// ERROR: Invalid email address.</p>
        <button class="btn-primary" id="run-btn" onclick="startPipeline()">// Run Research Engine</button>
        <p class="internal-note">// Internal use only.</p>
      </div>

      <!-- ══ STAGE 2: RESEARCH RUNNING ══════════ -->
      <div class="stage" id="stage-2">
        <div class="terminal-card violet-glow">
          <div class="terminal-header">
            <div class="terminal-dot dot-red"></div>
            <div class="terminal-dot dot-amber"></div>
            <div class="terminal-dot dot-green"></div>
            <span class="terminal-title">research-engine.sh</span>
          </div>
          <div class="terminal-log" id="research-log"></div>
        </div>
      </div>

      <!-- ══ STAGE 3A: DISQUALIFIED ══════════════ -->
      <div class="stage" id="stage-disq">
        <div class="disq-card">
          <p class="disq-heading">// PROSPECT DISQUALIFIED</p>
          <p class="disq-reason" id="disq-reason"></p>
          <button class="btn-reset-disq" onclick="resetToStage1()">// Run New Prospect</button>
        </div>
      </div>

      <!-- ══ STAGE 3B: QUALIFIED FLASH ══════════ -->
      <div class="stage" id="stage-flash">
        <div class="terminal-card" style="text-align:center; padding: 40px 28px;">
          <p class="flash-text">// QUALIFIED. Generating email...</p>
        </div>
      </div>

      <!-- ══ STAGE 4: EMAIL GENERATION ══════════ -->
      <div class="stage" id="stage-4">
        <div class="terminal-card violet-glow">
          <div class="terminal-header">
            <div class="terminal-dot dot-red"></div>
            <div class="terminal-dot dot-amber"></div>
            <div class="terminal-dot dot-green"></div>
            <span class="terminal-title">email-writer.sh</span>
          </div>
          <div class="terminal-log" id="email-gen-log"></div>
        </div>
      </div>

      <!-- ══ STAGE 5: EMAIL READY ════════════════ -->
      <div class="stage" id="stage-5">
        <div class="email-card">
          <div class="email-card-header">// EMAIL READY TO SEND</div>
          <div class="field-body">
            <div class="field-value" id="out-email-plain"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-solid" onclick="copyEmailToClipboard()">// Copy Email</button>
          <button class="btn-outline" onclick="resetToStage1()">// Run New Prospect</button>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
  /* ── Theme ──────────────────────────────────── */
  (function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();

  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('toggle-icon');
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
      if (icon) icon.textContent = '☾';
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      if (icon) icon.textContent = '☀';
      localStorage.setItem('theme', 'dark');
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    const icon = document.getElementById('toggle-icon');
    if (icon && localStorage.getItem('theme') === 'dark') {
      icon.textContent = '☀';
    }
  });

  /* ── State ─────────────────────────────────── */
  let currentEmail  = '';
  let dossierText   = '';
  let emailSubject  = '';
  let emailBody     = '';
  let dossierOpen   = false;

  /* ── Helpers ───────────────────────────────── */
  function showStage(id) {
    document.querySelectorAll('.stage').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const el = document.getElementById(id);
    el.style.display = 'block';
    // Trigger reflow so animation replays
    void el.offsetWidth;
    el.classList.add('active');
  }

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  async function appendLine(containerId, text, extraClass) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 't-line' + (extraClass ? ' ' + extraClass : '');
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function runAnimation(containerId, lines, intervalMs) {
    document.getElementById(containerId).innerHTML = '';
    for (const line of lines) {
      await sleep(intervalMs);
      await appendLine(containerId, line);
    }
  }

  /* ── Prompts ───────────────────────────────── */
  function buildGeminiPrompt(email) {
    return `ROLE: You are a research analyst for Tanim, who runs a premium creative agency. Your job is to validate prospects and build intelligence dossiers that will be used to write personalized outreach emails.

CRITICAL CONTEXT:
I serve BUSINESS OWNERS who use content as a sales channel (to sell courses, coaching, consulting, services worth $2,000+). Not YouTubers who just make money from AdSense and sponsors.

The difference:
- YouTuber = Makes money FROM content (AdSense, sponsors, merch) -> DISQUALIFY
- Business Owner = Makes money THROUGH content (drives sales to offers) -> QUALIFY

YOUR INPUT
I will provide only a Gmail address. Your first task is to find the YouTube channel associated with this email. Many creators list their Gmail in their YouTube About section. Search for this email across the web and find their YouTube channel. Once found, pick the two most recent videos (or two that best represent their content style) for your deep dive analysis.

Gmail address: ${email}

PHASE 1: INSTANT DISQUALIFICATION CHECK

BEFORE any research, scan for these AUTOMATIC DISQUALIFIERS:
- Gaming / Vlogging / Reaction / Prank content
- Crypto / NFT / Trading "guru"
- Kids / Family / Lifestyle-only
- Music artists / Bands
- Political / Religious content focus
- ASMR / Relaxation

  // Injects the video URL as plain text so every mail client can see/tap it
  function withVideoUrl(text) {
    return text.replace(/the video I recorded/gi, `the video I recorded: ${VIDEO_URL}`);
  }

  function parseAndShowEmail(raw) {
    const lines = raw.trim().split('\n');
    let subjectLine = '';
    let bodyStart   = 0;

    for (let i = 0; i < lines.length; i++) {
      if (/^SUBJECT:\s*/i.test(lines[i])) {
        subjectLine = lines[i].replace(/^SUBJECT:\s*/i, '').trim();
        for (let j = i + 1; j < lines.length; j++) {
          if (lines[j].trim() === '') {
            bodyStart = j + 1;
            break;
          }
        }
        break;
      }
    }

    const body = stripEmDashes(lines.slice(bodyStart).join('\n').trim());
    subjectLine  = stripEmDashes(subjectLine);

    emailSubject = subjectLine;
    emailBody    = buildBodyPlain(body); // plain text goes into mailto

    // Format plain email for display
    const plainEmail = `To: ${currentEmail}\nSubject: ${emailSubject}\n\n${withVideoUrl(emailBody)}`;
    document.getElementById('out-email-plain').textContent = plainEmail;
    document.getElementById('out-email-plain').style.whiteSpace = 'pre-wrap';
    document.getElementById('out-email-plain').style.wordWrap = 'break-word';

    showStage('stage-5');
  }

  /* ── Mail App ───────────────────────────────── */
  function openMailApp() {
    // Use CRLF so every mail client preserves paragraph spacing.
    // withVideoUrl injects the raw URL — mailto can't carry HTML but all
    // mail clients (iOS Mail, Gmail, Android) auto-hyperlink bare URLs.
    const bodyForMailto = withVideoUrl(emailBody).replace(/\n/g, '\r\n');
    const mailto =
      'mailto:' + encodeURIComponent(currentEmail) +
      '?subject=' + encodeURIComponent(emailSubject) +
      '&body=' + encodeURIComponent(bodyForMailto);
    // Anchor click works on both desktop and mobile (avoids page-navigation issues on iOS/Android)
    const a = document.createElement('a');
    a.href = mailto;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  /* ── Copy to Clipboard ───────────────────────── */
  async function copyEmailToClipboard() {
    const btn = document.querySelector('.btn-solid');
    const plainEmailText = document.getElementById('out-email-plain').textContent;

    let copied = false;

    // 1. ClipboardItem — plain text
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(plainEmailText);
        copied = true;
      } catch (_) {}
    }

    // 2. textarea fallback
    if (!copied) {
      const ta = document.createElement('textarea');
      ta.value = plainEmailText;
      ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { copied = document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }

    if (copied && btn) {
      btn.textContent = '// Copied!';
      btn.style.background = 'var(--green)';
      setTimeout(() => {
        btn.textContent = '// Copy Email';
        btn.style.background = '';
      }, 2000);
    }
  }

  /* ── Dossier Toggle ─────────────────────────── */
  function toggleDossier() {
    dossierOpen = !dossierOpen;
    const panel  = document.getElementById('dossier-panel');
    const toggle = document.getElementById('dossier-toggle-btn');
    if (dossierOpen) {
      panel.classList.add('open');
      toggle.textContent = '// Hide Research Dossier';
    } else {
      panel.classList.remove('open');
      toggle.textContent = '// View Research Dossier';
    }
  }

  /* ── Reset ──────────────────────────────────── */
  function resetToStage1() {
    currentEmail  = '';
    dossierText   = '';
    emailSubject  = '';
    emailBody     = '';
    dossierOpen   = false;

    document.getElementById('email-input').value       = '';
    document.getElementById('email-input').classList.remove('error');
    document.getElementById('email-error').style.display = 'none';
    document.getElementById('dossier-panel').classList.remove('open');
    document.getElementById('dossier-toggle-btn').textContent = '// View Research Dossier';

    showStage('stage-1');
  }

  /* ── Enter key support ──────────────────────── */
  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') startPipeline();
  });
</script>
